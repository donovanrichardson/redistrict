services:
  db:
    image: postgres:17
    container_name: redistrict-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redistrict}
      POSTGRES_USER: ${POSTGRES_USER:-redistrict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redistrict}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
